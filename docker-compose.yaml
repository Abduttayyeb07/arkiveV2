services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  arkive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkive
    volumes:
      - arkive:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${ARKIVE_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'ARKIVE_SECRET_KEY='
      - 'ARKIVE_NAME=Arkive'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  arkive: {}
